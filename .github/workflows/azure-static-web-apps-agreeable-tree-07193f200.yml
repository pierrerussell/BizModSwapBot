name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  # -------------------------------------------------------------
  # JOB 1: Deploy React Frontend to Azure Static Web Apps
  # -------------------------------------------------------------
  build_and_deploy_frontend:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Deploy React Frontend (Azure SWA)
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy Frontend
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          NPM_CONFIG_LEGACY_PEER_DEPS: true
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_TREE_07193F200 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./react"
          api_location: ""
          output_location: "dist"

  # -------------------------------------------------------------
  # JOB 2: Deploy Backend API/Web App to MonsterASP
  # -------------------------------------------------------------
  build_and_deploy_backend:
    if: github.event_name == 'push'
    runs-on: windows-latest
    name: Deploy Backend Web App (MonsterASP)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' 

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Backend
        run: dotnet build --configuration Release --no-restore

      - name: Publish Backend
        run: dotnet publish --configuration Release --output ./publish --no-build

      - name: Deploy via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@v2
        with:
          website-name: ${{ secrets.MONSTERASP_WEBSITE_NAME }}
          server-computer-name: ${{ secrets.MONSTERASP_COMPUTER_NAME }}
          server-username: ${{ secrets.MONSTERASP_USERNAME }}
          server-password: ${{ secrets.MONSTERASP_PASSWORD }}
          source-path: './publish'

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AGREEABLE_TREE_07193F200 }}
          action: "close"
